[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"

# Redirect all routes to index.html for React Router SPA
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# API proxy to your backend (update BACKEND_URL after deploying backend)
[[redirects]]
  from = "/api/*"
  to = "https://YOUR_BACKEND_URL.onrender.com/api/:splat"
  status = 200
  force = true
